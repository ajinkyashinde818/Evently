<div class="signup-page">

  <div class="signup-card">

    <!-- LEFT -->
    <div class="signup-left">

      <div class="brand">
        <img src="assets/images/evently-colorful-logo.svg" alt="Evently Logo">
        <span>Evently</span>
      </div>

      <h1>Create Your Account</h1>
      <p>Join us and start managing events effortlessly.</p>

      <form (ngSubmit)="signup()">

        <!-- Name -->
        <div class="input-group">
          <span class="icon">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="3"></circle>
              <path d="M6 20a6 6 0 0112 0"></path>
            </svg>
          </span>
          <input
            type="text"
            placeholder="Full Name"
            [(ngModel)]="name"
            name="name"
            required
          >
        </div>

        <!-- Email -->
        <div class="input-group">
          <span class="icon">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect>
              <polyline points="3 7 12 13 21 7"></polyline>
            </svg>
          </span>
          <input
            type="email"
            placeholder="Email Address"
            [(ngModel)]="email"
            name="email"
            required
          >
        </div>

        <!-- Password -->
        <div class="input-group">
          <span class="icon">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="10" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 10V7a5 5 0 0110 0v3"></path>
            </svg>
          </span>
          <input
            type="password"
            placeholder="Create Password"
            [(ngModel)]="password"
            name="password"
            required
          >
          <span class="eye">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </span>
        </div>

        <button class="signup-btn" type="submit">
          Create Account
        </button>

      </form>

      <div class="signin-text">
        Already have an account?
        <a routerLink="/login">Sign In</a>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="signup-right">
      <img src="assets/images/signup.png" alt="">
    </div>

  </div>

</div>
