<div class="login-page">

  <div class="login-card">

    <!-- LEFT -->
    <div class="login-left">

      <div class="brand">
        <img src="assets/images/evently-colorful-logo.svg" alt="Evently Logo">
        <span>Evently</span>
      </div>

      <h1>Hello,<br>Namaste</h1>
      <p>Login to continue managing your events.</p>

      <!-- Email -->
      <div class="input-group">
        <span class="icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect>
            <polyline points="3 7 12 13 21 7"></polyline>
          </svg>
        </span>
        <input 
          type="email" 
          placeholder="Email"
          [(ngModel)]="email"
          name="email"
        >
      </div>

      <!-- Password -->
      <div class="input-group">
        <span class="icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="10" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 10V7a5 5 0 0110 0v3"></path>
          </svg>
        </span>
        <input 
          type="password" 
          placeholder="Password"
          [(ngModel)]="password"
        >
      </div>

<button class="login-btn" (click)="login()">Sign In</button>

      <div class="signup-text">
        Don’t have an account?
        <a routerLink="/signup">Sign Up</a>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="login-right">
      <img src="assets/images/login.png" alt="">
    </div>

  </div>

</div>
