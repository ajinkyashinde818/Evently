<div class="checkins-page">

  <!-- Page Header -->
  <div class="page-header">
    <h1>Event Check-ins</h1>
    <p>Choose an ongoing or upcoming event to begin check-in process</p>
    
    <!-- Search Bar -->
    <div class="search-container">
      <input 
        type="text" 
        placeholder="Search events..." 
        [(ngModel)]="searchTerm"
        (keyup)="filterEvents()"
        class="search-input"
      >
      <button *ngIf="searchTerm" class="clear-btn" (click)="clearSearch()">
        ✖
      </button>
    </div>
  </div>

  <!-- Events Grid -->
  <div class="events-grid">

    <div class="event-card" *ngFor="let event of filteredEvents">

      <!-- Event Title + Status -->
      <div class="top">
        <h3>{{ event.title }}</h3>

        <span class="badge" [ngClass]="event.status?.toLowerCase()">
          {{ event.status }}
        </span>
      </div>

      <!-- Event Date -->
      <p class="date">
        <span class="inline-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="17" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="2" x2="9" y2="6"></line>
            <line x1="15" y1="2" x2="15" y2="6"></line>
          </svg>
        </span>
        {{ event.date }}
      </p>

      <!-- Start Check-in Button -->
      <a 
        class="start-btn"
        [routerLink]="['/checkins', event.id]"
      >
        Start Check-in
      </a>

    </div>

  </div>

  <!-- Empty State -->
  <div *ngIf="filteredEvents.length === 0" class="empty-state">
    <p>No events found matching "{{ searchTerm }}".</p>
  </div>

</div>
