<div class="images-page">

  <div class="page-header">
    <h1>
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px;vertical-align:middle;">
        <rect x="3" y="3" width="18" height="14" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="9" r="1.5"></circle>
        <polyline points="21 13 16 9 10 15"></polyline>
      </svg>
      Event Gallery
    </h1>
    <p>Captured moments from this event</p>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="loading-state">
    <p>Loading images...</p>
  </div>

  <!-- No Images State -->
  <div *ngIf="!loading && filteredImages.length === 0" class="no-images">
    <p>No images available for this event.</p>
  </div>

  <!-- Image Gallery -->
  <div class="gallery-grid" *ngIf="!loading && filteredImages.length > 0">

    <div class="image-card"
         *ngFor="let img of filteredImages"
         (click)="openPreview(img.url)">

      <img [src]="img.url" [alt]="img.fileName" (error)="onImageError($event)" (load)="onImageLoad($event)">

    </div>

  </div>

</div>


<!-- 🔹 IMAGE PREVIEW MODAL -->

<div class="preview-overlay" *ngIf="previewImage">

  <span class="close-btn" (click)="closePreview()">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </span>

  <img
    class="preview-image"
    [src]="previewImage"
    (error)="onPreviewError($event)">

</div>
