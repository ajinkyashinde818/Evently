<div class="media-page">

  <div class="page-header">
    <h1>
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px;vertical-align:middle;">
        <rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect>
        <path d="M9 5l2-2h2l2 2"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      Event Media Upload
    </h1>
    <p>Upload event photos and send them to registered participants</p>
  </div>

  <!-- Success Message -->
  <div class="success-message" *ngIf="uploadSuccess" [class.show]="uploadSuccess">
    {{ uploadMessage }}
  </div>

  <div class="media-grid">

    <!-- IMAGES SECTION -->
    <div class="media-card">

      <h2>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;vertical-align:middle;">
          <rect x="3" y="3" width="18" height="14" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="9" r="1.5"></circle>
          <polyline points="21 13 16 9 10 15"></polyline>
        </svg>
        Event Images
      </h2>

      <label class="upload-box">

        <input
        type="file"
        multiple
        accept="image/*"
        (change)="onImagesSelected($event)"
        hidden>

        <div class="upload-content">
          <div class="upload-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 3v12"></path>
              <path d="M8 7l4-4 4 4"></path>
              <rect x="4" y="15" width="16" height="4" rx="2" ry="2"></rect>
            </svg>
          </div>
          <p>Drag & Drop Images</p>
          <span>or click to browse</span>
        </div>

      </label>


      <!-- IMAGE PREVIEW -->
      <div class="preview-grid" *ngIf="selectedImages.length">

        <div class="preview-card" *ngFor="let img of selectedImages">

          <img [src]="img.preview">

        </div>

      </div>


      <button
      class="upload-btn"
      (click)="uploadImages()"
      [disabled]="!selectedImages.length">

      Upload & Send to Participants ({{selectedImages.length}})

      </button>

    </div>

  </div>

</div>
