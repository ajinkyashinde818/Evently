<div class="registrations-page">

  <div class="page-header">
    <h1>Event Registrations</h1>
    <p>Choose an event to view its registration details</p>
    
    <!-- Search Bar -->
    <div class="search-container">
      <input 
        type="text" 
        placeholder="Search events..." 
        [(ngModel)]="searchTerm"
        (keyup)="filterEvents()"
        class="search-input"
      >
      <button *ngIf="searchTerm" class="clear-btn" (click)="clearSearch()">
        ✖
      </button>
    </div>
  </div>

  <div class="events-grid">

    <div class="event-card" *ngFor="let event of filteredEvents">

      <!-- Banner -->
      <div class="banner">
        <img 
          *ngIf="event.banner_image"
          [src]="'http://localhost:5000/uploads/' + event.banner_image"
        >
      </div>

      <div class="card-top">
        <h3>{{ event.title }}</h3>

        <span class="badge" [ngClass]="event.status">
          {{ event.status }}
        </span>
      </div>

      <div class="date">
        <span class="inline-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="17" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="2" x2="9" y2="6"></line>
            <line x1="15" y1="2" x2="15" y2="6"></line>
          </svg>
        </span>
        {{ event.date }}
      </div>

      <div class="card-footer">
        <span class="inline-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H7a4 4 0 00-4 4v2"></path>
            <circle cx="9" cy="9" r="3"></circle>
            <path d="M21 21v-2a4 4 0 00-3-3.87"></path>
            <path d="M16 3.13a4 4 0 010 7.75"></path>
          </svg>
        </span>
        {{ event.registrations }} Registrations
      </div>

      <a 
        [routerLink]="['/registrations', event.id]"
        class="overlay-link">
      </a>

    </div>

  </div>

  <!-- Empty State -->
  <div *ngIf="filteredEvents.length === 0" class="empty-state">
    <p>No events found matching "{{ searchTerm }}".</p>
  </div>

</div>
