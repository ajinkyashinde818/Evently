<div class="manage-events-page">

  <div class="page-header">

    <div>
      <h1>Manage Events</h1>
      <p>Search, filter, and manage your events</p>
    </div>

    <button class="create-btn" (click)="goToCreateEvent()">
      + Create New Event
    </button>

  </div>


  <div class="controls">

      <input
        type="text"
        placeholder="Search events..."
        [(ngModel)]="searchText"
        (input)="applyFilters()"
      >

    <select [(ngModel)]="selectedStatus" (change)="applyFilters()">
      <option value="all">All Status</option>
      <option value="published">Published</option>
      <option value="upcoming">Upcoming</option>
      <option value="completed">Completed</option>
    </select>

  </div>


  <div class="events-container">

    <div class="event-card" *ngFor="let event of filteredEvents">

      <div class="event-top">
        <div class="event-header-info">
          <h3>{{ event.title }}</h3>
          <span class="badge" [ngClass]="event.status">
            {{ event.status }}
          </span>
        </div>
      </div>

      <div class="event-details">
        <div class="detail-row">
          <strong>Location:</strong> {{ event.location }}
        </div>
        <div class="detail-row">
          <strong>Date:</strong> {{ event.date | date:'mediumDate' }}
        </div>
        <!-- Registered Users -->
        <div class="detail-row" *ngIf="event.registeredUsers && event.registeredUsers.length > 0">
          <strong>Users:</strong>
          <div class="registered-users">
            <span class="user-badge" *ngFor="let user of event.registeredUsers" [title]="user.name + ' (' + user.email + ')'">
              {{ user.name }}
            </span>
          </div>
        </div>
        <div class="detail-row" *ngIf="event.venue">
          <strong>Venue:</strong> {{ event.venue }}
        </div>
        <div class="detail-row" *ngIf="event.description">
          <strong>Description:</strong> 
          <span class="description-text">{{ event.description }}</span>
        </div>
        <div class="detail-row" *ngIf="event.banner_image">
          <strong>Banner:</strong> 
          <div class="banner-preview">
            <img [src]="getBannerUrl(event.banner_image)" 
                 [alt]="event.title" 
                 class="banner-thumb"
                 (error)="onBannerImageError(event)">
            <div class="no-banner" *ngIf="!event.banner_image">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <div class="event-actions">

        <!-- EDIT -->
        <button
        class="edit-btn"
        (click)="editEvent(event.id)">
         Edit
        </button>

        <!-- DELETE -->
       <button
class="delete-btn"
(click)="deleteEvent(event)">
Delete
</button>

        <!-- END EVENT / UPLOAD MEDIA -->
        <button
        class="end-btn"
        *ngIf="event.status !== 'completed'"
        (click)="endEvent(event.id)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;">
          <path d="M4 4h12l-2 5 2 5H4z"></path>
          <path d="M4 4v16"></path>
        </svg>
        End Event
        </button>

        <!-- UPLOAD MEDIA (AFTER EVENT ENDED) -->
        <button
        class="media-btn"
        *ngIf="event.status === 'completed'"
        (click)="manageMedia(event.id)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;">
          <rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect>
          <path d="M9 5l2-2h2l2 2"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        Upload Media
        </button>

      </div>

    </div>


    <div class="empty" *ngIf="filteredEvents.length === 0">
      No events found
    </div>

  </div>

</div>
